<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>KPK Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/dashboard.css">
</head>

<body>

  <div class="dashboard-grid"></div>

  <header class="dashboard-header">
    <div>
      <h1 data-lang="dashboardTitle">Dashboard</h1>
      <p data-lang="dashboardDesc">KPK platformasiga xush kelibsiz</p>
    </div>

    <div class="profile-wrapper" id="profileWrapper">
      <button class="profile-btn" id="profileBtn" type="button">
        <img id="profileImage" src="./images/user.png" alt="Profile">
      </button>

      <div class="profile-menu" id="profileMenu">
        <div class="profile-info">
          <img id="menuProfileImage" src="./images/user.png" alt="Profile">

          <div>
            <h3 id="profileName">User</h3>
            <p id="profileEmail">user@gmail.com</p>
            <span id="profileProvider">Google</span>
          </div>
        </div>

        <button class="profile-menu-item" type="button" id="settingsBtn">
          <i class="bi bi-gear"></i>
          <span data-lang="settings">Sozlamalar</span>
        </button>

        <button class="profile-menu-item logout" type="button" id="logoutBtn">
          <i class="bi bi-box-arrow-right"></i>
          <span data-lang="logout">Chiqish</span>
        </button>
      </div>
    </div>
  </header>

  <main class="dashboard-main">
    <section class="welcome-card">
      <div class="welcome-icon">
        <i class="bi bi-mortarboard"></i>
      </div>

      <h2 data-lang="welcomeDashboard">KPK platformasiga xush kelibsiz</h2>

      <p data-lang="welcomeDashboardText">
        Bu yerda talabalar salohiyati, ijodkorlik va kasbiy o‘sish jarayonlari boshqariladi.
      </p>
    </section>
  </main>

  <script src="./JavaScript/dashboard.js"></script>
  <script type="module" src="./JavaScript/firebase.js"></script>
</body>
</html>
